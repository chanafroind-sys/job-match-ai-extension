services:
  - type: web
    name: job-match-ai-server
    runtime: python
    rootDir: server-python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GUMROAD_PRODUCT_ID
        sync: false
      - key: MAX_DEVICES_PER_KEY
        value: "3"
      - key: MONTHLY_USAGE_LIMIT
        value: "100"
